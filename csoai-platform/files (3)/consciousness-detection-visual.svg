<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Central AI Brain -->
  <g transform="translate(600, 315)">
    <!-- Brain outline -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#10b981" stroke-width="3" opacity="0.6"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#10b981" stroke-width="2" opacity="0.4"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#10b981" stroke-width="2" opacity="0.3"/>
    
    <!-- Neural network nodes -->
    <circle cx="-50" cy="-40" r="8" fill="#10b981"/>
    <circle cx="50" cy="-40" r="8" fill="#10b981"/>
    <circle cx="-70" cy="0" r="8" fill="#10b981"/>
    <circle cx="70" cy="0" r="8" fill="#10b981"/>
    <circle cx="-50" cy="40" r="8" fill="#10b981"/>
    <circle cx="50" cy="40" r="8" fill="#10b981"/>
    <circle cx="0" cy="-60" r="8" fill="#10b981"/>
    <circle cx="0" cy="60" r="8" fill="#10b981"/>
    <circle cx="0" cy="0" r="12" fill="#10b981"/>
    
    <!-- Connections -->
    <line x1="-50" y1="-40" x2="0" y2="0" stroke="#10b981" stroke-width="1" opacity="0.3"/>
    <line x1="50" y1="-40" x2="0" y2="0" stroke="#10b981" stroke-width="1" opacity="0.3"/>
    <line x1="-70" y1="0" x2="0" y2="0" stroke="#10b981" stroke-width="1" opacity="0.3"/>
    <line x1="70" y1="0" x2="0" y2="0" stroke="#10b981" stroke-width="1" opacity="0.3"/>
    <line x1="-50" y1="40" x2="0" y2="0" stroke="#10b981" stroke-width="1" opacity="0.3"/>
    <line x1="50" y1="40" x2="0" y2="0" stroke="#10b981" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="-60" x2="0" y2="0" stroke="#10b981" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="60" x2="0" y2="0" stroke="#10b981" stroke-width="1" opacity="0.3"/>
    
    <!-- Question mark overlay -->
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="100" font-weight="bold" 
          fill="#ef4444" text-anchor="middle" opacity="0.7">?</text>
  </g>
  
  <!-- 14 Indicators around the perimeter -->
  <g transform="translate(600, 315)">
    <!-- Indicator circles -->
    <circle cx="0" cy="-220" r="6" fill="#10b981" opacity="0.8"/>
    <circle cx="90" cy="-200" r="6" fill="#10b981" opacity="0.8"/>
    <circle cx="160" cy="-160" r="6" fill="#10b981" opacity="0.8"/>
    <circle cx="200" cy="-90" r="6" fill="#10b981" opacity="0.8"/>
    <circle cx="220" cy="0" r="6" fill="#10b981" opacity="0.8"/>
    <circle cx="200" cy="90" r="6" fill="#10b981" opacity="0.8"/>
    <circle cx="160" cy="160" r="6" fill="#10b981" opacity="0.8"/>
    <circle cx="90" cy="200" r="6" fill="#10b981" opacity="0.8"/>
    <circle cx="0" cy="220" r="6" fill="#10b981" opacity="0.8"/>
    <circle cx="-90" cy="200" r="6" fill="#10b981" opacity="0.8"/>
    <circle cx="-160" cy="160" r="6" fill="#10b981" opacity="0.8"/>
    <circle cx="-200" cy="90" r="6" fill="#10b981" opacity="0.8"/>
    <circle cx="-220" cy="0" r="6" fill="#10b981" opacity="0.8"/>
    <circle cx="-200" cy="-90" r="6" fill="#10b981" opacity="0.8"/>
    
    <!-- Connection lines to center -->
    <line x1="0" y1="-220" x2="0" y2="-120" stroke="#10b981" stroke-width="1" opacity="0.2"/>
    <line x1="220" y1="0" x2="120" y2="0" stroke="#10b981" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="220" x2="0" y2="120" stroke="#10b981" stroke-width="1" opacity="0.2"/>
    <line x1="-220" y1="0" x2="-120" y2="0" stroke="#10b981" stroke-width="1" opacity="0.2"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="#ffffff" text-anchor="middle">CONSCIOUSNESS DETECTION</text>
  
  <!-- Subtitle -->
  <text x="600" y="130" font-family="Arial, sans-serif" font-size="24" 
        fill="#94a3b8" text-anchor="middle">How will we know if AI becomes conscious?</text>
  
  <!-- Bottom text -->
  <text x="600" y="530" font-family="Arial, sans-serif" font-size="28" font-weight="bold"
        fill="#10b981" text-anchor="middle">14 INDICATORS | BYZANTINE COUNCIL MONITORING</text>
  
  <text x="600" y="570" font-family="Arial, sans-serif" font-size="24"
        fill="#94a3b8" text-anchor="middle">Not hoping. Not guessing. Measuring.</text>
  
  <!-- CSOAI branding -->
  <text x="100" y="590" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
        fill="#10b981">CSOAI</text>
  <text x="160" y="590" font-family="Arial, sans-serif" font-size="16"
        fill="#64748b">Council for the Safety of Artificial Intelligence</text>
</svg>