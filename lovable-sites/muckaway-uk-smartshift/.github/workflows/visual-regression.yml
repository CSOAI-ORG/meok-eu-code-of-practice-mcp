name: Visual Regression Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_baselines:
        description: 'Update baseline screenshots'
        required: false
        default: 'false'
        type: boolean

env:
  CI: true
  BASE_URL: http://localhost:8080

jobs:
  visual-tests:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Start preview server
        run: |
          npx serve -s dist -l 8080 &
          sleep 5
          curl -f http://localhost:8080 || exit 1

      - name: Run visual regression tests
        run: npx playwright test --project=desktop-chrome
        env:
          CI_TEST_USER_EMAIL: ${{ secrets.CI_TEST_USER_EMAIL }}
          CI_TEST_USER_PASSWORD: ${{ secrets.CI_TEST_USER_PASSWORD }}
        continue-on-error: true
        id: visual-tests

      - name: Update baselines (if requested)
        if: github.event.inputs.update_baselines == 'true'
        run: npx playwright test --update-snapshots --project=desktop-chrome
        env:
          CI_TEST_USER_EMAIL: ${{ secrets.CI_TEST_USER_EMAIL }}
          CI_TEST_USER_PASSWORD: ${{ secrets.CI_TEST_USER_PASSWORD }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: Upload baseline snapshots
        uses: actions/upload-artifact@v4
        if: github.event.inputs.update_baselines == 'true'
        with:
          name: updated-baselines
          path: e2e/__snapshots__/
          retention-days: 30

      - name: Generate test summary
        if: always()
        run: |
          if [ -f test-results/results.json ]; then
            node scripts/generate-ci-summary.js
          fi

      - name: Post PR comment with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let summary = '## 📸 Visual Regression Test Results\n\n';
            
            // Check if results file exists
            if (fs.existsSync('test-results/results.json')) {
              const results = JSON.parse(fs.readFileSync('test-results/results.json', 'utf8'));
              
              const total = results.suites?.reduce((acc, suite) => acc + (suite.specs?.length || 0), 0) || 0;
              const passed = results.suites?.reduce((acc, suite) => 
                acc + (suite.specs?.filter(s => s.ok)?.length || 0), 0) || 0;
              const failed = total - passed;
              
              if (failed > 0) {
                summary += `❌ **${failed} visual regression(s) detected**\n\n`;
                summary += '### Failed Tests\n\n';
                
                results.suites?.forEach(suite => {
                  suite.specs?.filter(s => !s.ok)?.forEach(spec => {
                    summary += `- ❌ ${spec.title}\n`;
                  });
                });
                
                summary += '\n**Please review the [Playwright Report artifact](' + 
                  `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}` +
                  ') for detailed comparisons.**\n\n';
                summary += '> To update baselines, re-run workflow with "Update baseline screenshots" checked.';
              } else {
                summary += `✅ **All ${total} visual tests passed**\n\n`;
                summary += 'No visual regressions detected.';
              }
            } else {
              summary += '⚠️ Test results not available. Check workflow logs for details.';
            }
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(c => 
              c.user.type === 'Bot' && c.body.includes('Visual Regression Test Results')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: summary,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary,
              });
            }

      - name: Report CI results to backend
        if: always()
        run: |
          if [ -f test-results/results.json ]; then
            node scripts/report-ci-results.js
          fi
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}

      - name: Fail if visual regressions detected
        if: steps.visual-tests.outcome == 'failure'
        run: |
          echo "Visual regression tests failed. Please review the differences."
          exit 1
