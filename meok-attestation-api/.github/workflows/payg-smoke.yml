name: PAYG E2E Smoke

on:
  # Run every push to main + on PR
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Daily at 06:30 UTC — same window as the EUR-Lex sync
  schedule:
    - cron: '30 6 * * *'
  # Manual fire
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PAYG E2E smoke against live production
        run: |
          if [ ! -f tools/smoke_test_payg_e2e.sh ]; then
            echo "::warning::Pulling smoke script from clawd-workspace if local copy missing"
            curl -sSL -o tools/smoke_test_payg_e2e.sh https://raw.githubusercontent.com/CSOAI-ORG/clawd-workspace/main/tools/smoke_test_payg_e2e.sh
            chmod +x tools/smoke_test_payg_e2e.sh
          fi
          bash tools/smoke_test_payg_e2e.sh

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `PAYG smoke FAIL — ${today}`,
              body: `The daily PAYG E2E smoke test failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nLikely causes:\n- STRIPE_SECRET_KEY env var dropped in Vercel\n- STRIPE_WEBHOOK_SECRET env var dropped in Vercel\n- meok-attestation-api deploy errored\n- Vercel routing regression\n\nCheck /payg/health response body to localise.`,
              labels: ['payg-smoke-fail'],
            });
