upstream openpatent-api    { server 127.0.0.1:3211; }
upstream openpatent-landing { server 127.0.0.1:3000; }
upstream openpatent-legalof { server 127.0.0.1:3031; }
upstream openpatent-harvi   { server 127.0.0.1:3032; }
upstream openpatent-ipcastle { server 127.0.0.1:3033; }
upstream openpatent-sovereign { server 127.0.0.1:3034; }

server {
    listen 80 default_server;
    server_name openpatent.ai www.openpatent.ai;
    client_max_body_size 50M;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    location / {
        proxy_pass http://openpatent-landing;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /v1/ { proxy_pass http://openpatent-api; proxy_set_header Host $host; }
    location /openapi.json { proxy_pass http://openpatent-api/openapi.json; }
    location /docs { proxy_pass http://openpatent-api/docs; }
    location /redoc { proxy_pass http://openpatent-api/redoc; }
    location /metrics { proxy_pass http://openpatent-api/metrics; }
}

server {
    listen 80;
    server_name legalof.ai www.legalof.ai;
    client_max_body_size 50M;
    add_header X-Power "openpatent.ai" always;
    add_header Access-Control-Allow-Origin "*" always;
    location / { proxy_pass http://openpatent-legalof; proxy_set_header Host $host; }
    location /v1/ { proxy_pass http://openpatent-api; }
}

server {
    listen 80;
    server_name harvi.ai www.harvi.ai;
    client_max_body_size 50M;
    add_header X-Power "openpatent.ai" always;
    add_header Access-Control-Allow-Origin "*" always;
    location / { proxy_pass http://openpatent-harvi; proxy_set_header Host $host; }
    location /v1/ { proxy_pass http://openpatent-api; }
}

server {
    listen 80;
    server_name ipcastle.ai www.ipcastle.ai;
    client_max_body_size 50M;
    add_header X-Power "openpatent.ai" always;
    add_header Access-Control-Allow-Origin "*" always;
    location / { proxy_pass http://openpatent-ipcastle; proxy_set_header Host $host; }
    location /v1/ { proxy_pass http://openpatent-api; }
}

server {
    listen 80;
    server_name sovereign-temple.ai www.sovereign-temple.ai;
    client_max_body_size 50M;
    add_header X-Power "openpatent.ai" always;
    add_header Access-Control-Allow-Origin "*" always;
    location / { proxy_pass http://openpatent-sovereign; proxy_set_header Host $host; }
    location /v1/ { proxy_pass http://openpatent-api; }
}
