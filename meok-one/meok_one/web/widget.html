<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>MEOK widget</title>
<link rel="icon" href="/icon.svg"/>
<!--
  MEOK embeddable widget (scorecard E3). A compact character + chat that drops into ANY page
  via /embed.js. Same origin as MEOK ONE, so its /api calls need no CORS. Sovereign-gated like
  everything else. Query: ?character=aria&accent=%237c5cff
-->
<style>
  :root{--accent:#7c5cff;--accent2:#38bdf8;--ink:#f3f0ff;--dim:#9a9ab4;--bg:#0b0a14;--panel:#14141f;--line:#262636}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);overflow:hidden;
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .w{display:flex;flex-direction:column;height:100%}
  .char{height:42%;min-height:150px;border-bottom:1px solid var(--line);position:relative;background:radial-gradient(120% 90% at 50% 0%,#241a44,#0b0a14)}
  .char iframe{width:100%;height:100%;border:0}
  .msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
  .msg{max-width:85%;padding:8px 11px;border-radius:14px;font-size:13px;white-space:pre-wrap;word-break:break-word}
  .msg.you{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
  .msg.ai{align-self:flex-start;background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:4px}
  .msg .who{font-size:10px;color:var(--dim);margin-bottom:2px}
  .composer{display:flex;gap:6px;border-top:1px solid var(--line);padding:8px;background:#0a0a12}
  .composer input{flex:1;background:#0a0a14;border:1px solid var(--line);border-radius:99px;padding:9px 13px;color:var(--ink);outline:none;font-size:13px}
  .composer button{background:linear-gradient(135deg,var(--accent),var(--accent2));border:0;color:#fff;border-radius:99px;padding:0 14px;font-weight:700;cursor:pointer}
  .powered{font-size:9.5px;color:var(--dim);text-align:center;padding:3px}
  .powered a{color:var(--accent2);text-decoration:none}
</style>
</head>
<body>
<div class="w">
  <div class="char"><iframe id="cf" title="character"></iframe></div>
  <div class="msgs" id="msgs"></div>
  <div class="composer">
    <input id="in" placeholder="Talk to your AI…" autocomplete="off"/>
    <button id="send">➤</button>
  </div>
  <div class="powered">⚡ <a href="/os" target="_blank">Powered by MEOK</a> · Sovereign-safe</div>
</div>
<script>
const Q=new URLSearchParams(location.search);
const CHAR=Q.get("character")||"aria";
const ACCENT=Q.get("accent"); if(ACCENT){ document.documentElement.style.setProperty("--accent",ACCENT); }
document.getElementById("cf").src="/avatar?embed=1&character="+encodeURIComponent(CHAR);
const $=s=>document.querySelector(s), msgs=$("#msgs");
// anonymous-first identity so the bond persists for this visitor (cross-device via the main app)
let TOKEN=localStorage.getItem("meok_token")||"";
const _f=window.fetch.bind(window);
window.fetch=(u,o={})=>{ if(TOKEN&&typeof u==="string"&&u.startsWith("/api")){o={...o,headers:{...(o.headers||{}),Authorization:"Bearer "+TOKEN}};} return _f(u,o); };
(async()=>{ if(!TOKEN){ try{ const d=await(await _f("/api/auth/anon",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"})).json(); if(d.token){TOKEN=d.token;localStorage.setItem("meok_token",TOKEN);} }catch(_){} } })();
function add(who,txt,cls){ const m=document.createElement("div"); m.className="msg "+cls; m.innerHTML=`<div class="who">${who}</div>`+txt.replace(/</g,"&lt;"); msgs.appendChild(m); msgs.scrollTop=1e9; return m; }
async function send(){
  const t=$("#in").value.trim(); if(!t) return; add("you",t,"you"); $("#in").value="";
  const typing=add(CHAR,"…","ai");
  try{
    const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),20000);
    const r=await fetch("/api/think",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({character:CHAR,message:t,brain:"right",tier:"pro"}),signal:ctrl.signal});
    clearTimeout(to); const d=await r.json();
    typing.innerHTML=`<div class="who">${d.character||CHAR}</div>`+(d.reply||"…").replace(/</g,"&lt;");
    try{ document.getElementById("cf").contentWindow.postMessage({type:"meok-emote",text:d.reply||""},"*"); }catch(_){}
  }catch(e){ typing.innerHTML=`<div class="who">${CHAR}</div>I couldn't reach my brain just now — try again in a moment.`; }
}
$("#send").onclick=send; $("#in").addEventListener("keydown",e=>{ if(e.key==="Enter") send(); });
</script>
</body>
</html>
