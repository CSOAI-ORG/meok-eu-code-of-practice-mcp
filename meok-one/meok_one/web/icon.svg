<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- MEOK glass marble — translucent glass orb with a glowing golden core (deck visual direction).
       Unifies the logo with the hatch egg: same clear-glass + warm-gold-heart language. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#16131f"/>
      <stop offset="58%" stop-color="#0b0a12"/>
      <stop offset="100%" stop-color="#050409"/>
    </radialGradient>
    <radialGradient id="glass" cx="42%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="20%" stop-color="#e3ecff" stop-opacity="0.55"/>
      <stop offset="52%" stop-color="#90a8cc" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#28324d" stop-opacity="0.60"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="58%" r="42%">
      <stop offset="0%" stop-color="#fff6dc"/>
      <stop offset="28%" stop-color="#ffd368"/>
      <stop offset="62%" stop-color="#e8a23a" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#e8a23a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="irid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bd8cff"/>
      <stop offset="34%" stop-color="#5ec6ff"/>
      <stop offset="66%" stop-color="#5ef0c0"/>
      <stop offset="100%" stop-color="#ffd36b"/>
    </linearGradient>
    <radialGradient id="spec" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>

  <rect width="512" height="512" rx="0" fill="url(#bg)"/>
  <!-- outer iridescent halo -->
  <circle cx="256" cy="250" r="176" fill="url(#irid)" opacity="0.30" filter="url(#soft)"/>
  <!-- glass sphere body -->
  <circle cx="256" cy="250" r="160" fill="url(#glass)"/>
  <!-- glowing golden core (the heart — echoes the egg) -->
  <ellipse cx="256" cy="272" rx="94" ry="104" fill="url(#core)"/>
  <!-- iridescent rim -->
  <circle cx="256" cy="250" r="160" fill="none" stroke="url(#irid)" stroke-width="3.5" opacity="0.85"/>
  <!-- big soft specular highlight (top-left) -->
  <ellipse cx="203" cy="178" rx="64" ry="42" fill="url(#spec)" transform="rotate(-28 203 178)" opacity="0.92"/>
  <!-- small bright catchlight -->
  <circle cx="312" cy="198" r="11" fill="#ffffff" opacity="0.78"/>
  <!-- refracted caustic arc near base -->
  <path d="M152 356 Q256 408 360 356" fill="none" stroke="#ffe9b0" stroke-width="6" opacity="0.45" filter="url(#soft)"/>
</svg>
