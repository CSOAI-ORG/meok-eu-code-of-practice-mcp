<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>MEOK DOME — your AI's world, mapped onto Earth</title>
<link rel="icon" href="/icon.svg"/>
<!--
  MEOK DOME (Nick's vision: "openclaw world mixed with google maps geo… map it onto real world").
  A real-world MapLibre GLOBE. MEOK characters live as glowing pins across Earth's great cities.
  Open-source stack — MapLibre GL (BSD) + OpenStreetMap/CARTO dark tiles (keyless). NOT Google Maps.
  PRIVACY BY DESIGN: the "you are roughly here" pin is derived from your *timezone* only
  (region-level, no permission prompt) — never GPS, never an exact address.
-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@5.24.0/dist/maplibre-gl.css"/>
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
<style>
  :root{--accent:#7c5cff;--accent2:#38bdf8;--ink:#f3f0ff;--dim:#9a9ab4;--bg:#05040c}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink)}
  #map{position:absolute;inset:0}
  .maplibregl-ctrl-attrib{font-size:9px;background:rgba(5,4,12,.6)!important}
  .maplibregl-ctrl-attrib a{color:#8a8aa0!important}
  /* a faint vignette so the globe reads as a glowing planet in dark space */
  .vignette{position:absolute;inset:0;pointer-events:none;z-index:2;
            background:radial-gradient(circle at 50% 45%,transparent 52%,rgba(5,4,12,.65) 100%)}
  /* ---- character pins ---- */
  .pin{position:relative;width:34px;height:34px;cursor:pointer;transform:translate(-50%,-50%)}
  .pin .glow{position:absolute;inset:-6px;border-radius:50%;
    background:radial-gradient(circle,rgba(124,92,255,.55),transparent 70%);
    animation:pulse 2.6s ease-in-out infinite}
  .pin .dot{position:absolute;inset:0;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:17px;background:linear-gradient(145deg,#171728,#0c0c16);
    border:1.5px solid rgba(124,92,255,.8);box-shadow:0 2px 10px rgba(0,0,0,.6),0 0 14px rgba(124,92,255,.35)}
  .pin:hover .dot{border-color:var(--accent2);box-shadow:0 0 22px rgba(56,189,248,.6)}
  .pin.you .dot{border-color:#34d399;background:radial-gradient(circle,#0e2a20,#0c0c16)}
  .pin.you .glow{background:radial-gradient(circle,rgba(52,211,153,.5),transparent 70%)}
  /* your OWN factory creations get a gold ring so you can spot them in the world */
  .pin.mine .dot{border-color:#fbbf24;box-shadow:0 0 22px rgba(251,191,36,.65)}
  .pin.mine .glow{background:radial-gradient(circle,rgba(251,191,36,.5),transparent 70%)}
  .dome-adopt{margin-top:8px;width:100%;background:linear-gradient(135deg,#7C3AED,#38bdf8);
    border:0;color:#fff;border-radius:8px;padding:6px;font-size:12px;cursor:pointer}
  /* ambient speech bubble — the world feels alive (openclawworld vibe on the real map) */
  .pin .say{position:absolute;bottom:36px;left:50%;transform:translateX(-50%) translateY(4px) scale(.92);
    background:#12121e;border:1px solid var(--line);color:var(--ink);font-size:11px;line-height:1.3;
    padding:3px 8px;border-radius:11px;white-space:nowrap;max-width:170px;overflow:hidden;
    text-overflow:ellipsis;opacity:0;pointer-events:none;transition:opacity .35s ease,transform .35s ease;z-index:3}
  .pin .say.on{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.45);opacity:.25}}
  /* ---- overlay card ---- */
  .card{position:absolute;top:16px;left:16px;z-index:5;max-width:300px;pointer-events:none;
    background:rgba(10,9,22,.72);backdrop-filter:blur(12px);
    border:1px solid rgba(124,92,255,.25);border-radius:16px;padding:16px 18px;
    box-shadow:0 12px 40px rgba(0,0,0,.5)}
  .card h1{margin:0 0 4px;font-size:18px;letter-spacing:.3px;
    background:linear-gradient(90deg,#fff,#c9b8ff 60%,#8fd6ff);-webkit-background-clip:text;background-clip:text;color:transparent}
  .card p{margin:6px 0 0;font-size:12px;line-height:1.5;color:var(--dim)}
  .card .big{color:var(--ink);font-weight:600}
  .privacy{display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-size:10.5px;
    color:#34d399;border:1px solid rgba(52,211,153,.3);border-radius:20px;padding:3px 9px}
  .hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:5;pointer-events:none;
    font-size:11.5px;color:var(--dim);background:rgba(10,9,22,.6);backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:6px 14px;white-space:nowrap}
  /* popup */
  .maplibregl-popup-content{background:#12121e;color:var(--ink);border-radius:12px;
    border:1px solid rgba(124,92,255,.35);font-size:13px;padding:10px 14px;box-shadow:0 8px 30px rgba(0,0,0,.6)}
  .maplibregl-popup-content b{color:#fff}
  .maplibregl-popup-content .sub{color:var(--dim);font-size:11px;margin-top:2px}
  .maplibregl-popup-tip{display:none}
  .maplibregl-popup-close-button{color:var(--dim)}

  /* ===== DOME immersion: product nodes · cosmos · chat-to-control · live activity ===== */
  .hint{top:12px;bottom:auto}                                   /* free the bottom for the chat bar */
  #flyMe,#govBtn{bottom:70px!important}                          /* lift above the chat bar */
  /* product nodes — the MEOK constellation bridged onto Earth */
  .ppin{position:relative;width:30px;height:30px;cursor:pointer;transform:translate(-50%,-50%)}
  .ppin .pdot{position:absolute;inset:0;border-radius:9px;display:flex;align-items:center;justify-content:center;
    font-size:15px;background:linear-gradient(145deg,#1a1530,#0c0c16);border:1.5px solid rgba(251,191,36,.7);
    box-shadow:0 2px 12px rgba(0,0,0,.6),0 0 16px rgba(251,191,36,.3);transition:transform .2s}
  .ppin:hover .pdot{transform:scale(1.18)}
  .ppin .pring{position:absolute;inset:-5px;border-radius:12px;border:1px dashed rgba(251,191,36,.35);animation:prot 9s linear infinite}
  @keyframes prot{to{transform:rotate(360deg)}}
  .ppin .plabel{position:absolute;top:33px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:10px;
    color:#e9e4ff;background:rgba(8,7,18,.7);padding:1px 6px;border-radius:6px;pointer-events:none;opacity:.9}
  /* cosmos: the "zoom out to space, products as planets" cinematic layer */
  #cosmos{position:fixed;inset:0;z-index:20;display:none;opacity:0;transition:opacity .9s ease;
    background:radial-gradient(1200px 800px at 50% 42%,#1a1140 0%,#0a0820 45%,#03030a 100%);overflow:hidden}
  #cosmos.on{opacity:1}
  #stars{position:absolute;inset:0}
  .sun{position:absolute;top:50%;left:50%;width:118px;height:118px;margin:-59px 0 0 -59px;border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#fff6d8,#ffd76b 40%,#f59e0b 70%,#7c4a00);
    box-shadow:0 0 80px 20px rgba(251,191,36,.45);display:flex;align-items:center;justify-content:center;
    font-size:12.5px;font-weight:700;color:#3a2a05;text-align:center;cursor:pointer;z-index:3;line-height:1.1}
  .orbit{position:absolute;top:50%;left:50%;border:1px solid rgba(255,255,255,.07);border-radius:50%;transform:translate(-50%,-50%)}
  .planet{position:absolute;top:50%;left:50%;cursor:pointer;z-index:4;transform:translate(-50%,-50%);
    display:flex;flex-direction:column;align-items:center;gap:2px;transition:transform .25s}
  .planet:hover{transform:translate(-50%,-50%) scale(1.16)}
  .planet .pglobe{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:21px;
    background:radial-gradient(circle at 38% 32%,rgba(255,255,255,.22),rgba(10,9,22,.92));border:1px solid rgba(255,255,255,.18)}
  .planet .pname{font-size:11px;color:#e9e4ff;text-shadow:0 1px 4px #000}
  .planet .pkind{font-size:9px;color:#9a9ab4}
  #cosmos .ctitle{position:absolute;top:20px;left:0;right:0;text-align:center;color:#f3f0ff;font-size:15px;letter-spacing:.4px;pointer-events:none}
  #cosmos .ctitle small{display:block;color:#9a9ab4;font-size:11px;margin-top:3px}
  .dive{position:fixed;inset:0;z-index:40;background:#fff;opacity:0;pointer-events:none}
  .dive.on{animation:dive .65s ease forwards}
  @keyframes dive{0%{opacity:0;transform:scale(1)}55%{opacity:.85}100%{opacity:0;transform:scale(1.5)}}
  /* chat-to-control bar */
  #chatbar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:25;display:flex;gap:8px;
    width:min(560px,92vw);background:rgba(10,9,22,.82);backdrop-filter:blur(12px);border:1px solid rgba(124,92,255,.3);
    border-radius:14px;padding:8px 10px;box-shadow:0 12px 40px rgba(0,0,0,.5)}
  #chatbar input{flex:1;background:#0a0a14;border:1px solid rgba(255,255,255,.1);color:#f3f0ff;border-radius:9px;
    padding:9px 12px;font-size:13.5px;font-family:inherit;min-width:0}
  #chatbar input:focus{outline:none;border-color:#7c5cff}
  #chatbar button{background:linear-gradient(135deg,#7C3AED,#38bdf8);border:0;color:#fff;border-radius:9px;padding:9px 14px;font-size:13px;cursor:pointer;font-weight:600}
  #chatReply{position:absolute;bottom:62px;left:50%;transform:translateX(-50%);z-index:25;width:min(560px,92vw);
    max-height:34vh;overflow:auto;display:none;background:rgba(10,9,22,.92);backdrop-filter:blur(12px);
    border:1px solid rgba(124,92,255,.3);border-radius:12px;padding:11px 14px;font-size:13px;line-height:1.5;color:#e9e4ff}
  #chatReply .me{color:#8fd6ff;margin-bottom:4px}
  #chatReply a{color:#fbbf24}
  /* live activity panel + corner chips */
  #actPanel{position:absolute;right:14px;top:54px;z-index:7;width:300px;max-height:62vh;overflow:auto;display:none;
    background:rgba(10,9,22,.94);backdrop-filter:blur(14px);border:1px solid rgba(124,92,255,.3);border-radius:16px;
    padding:13px 15px;box-shadow:0 16px 48px rgba(0,0,0,.55);font-size:12px;line-height:1.45}
  #actPanel .ev{padding:6px 0;border-top:1px solid rgba(255,255,255,.07)}
  #actPanel .op{display:inline-block;min-width:26px;text-align:center;font-size:10px;font-weight:700;border-radius:5px;padding:1px 5px;margin-right:6px}
  .btnchip{position:absolute;z-index:8;background:rgba(18,18,30,.85);border:1px solid rgba(255,255,255,.1);color:#f3f0ff;
    border-radius:10px;padding:8px 12px;font-size:12px;cursor:pointer;backdrop-filter:blur(6px)}
</style>
</head>
<body>
  <div id="map"></div>
  <div class="vignette"></div>

  <div class="card">
    <h1>🏛️ MEOK DOME</h1>
    <p><span class="big">Your AI's world — mapped onto Earth.</span></p>
    <p><span id="count" class="big">…</span> characters, alive across the globe. Tap one to bring it into focus on the right.</p>
    <span class="privacy">🛡️ Region-level only · from timezone · never GPS</span>
  </div>
  <div class="hint">🌍 Drag to explore · scroll to zoom · tap a glowing character to focus it</div>
  <button id="flyMe" title="Fly to your region — timezone-derived, never GPS" style="position:absolute;right:14px;bottom:46px;z-index:5;background:rgba(18,18,30,.85);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:8px 12px;font-size:12px;cursor:pointer;backdrop-filter:blur(6px)">📍 Fly to my region</button>
  <!-- Governance HUD: WHY these agents stay in harmony (real, live config — the antidote to ungoverned AI towns) -->
  <button id="govBtn" title="How these AI agents stay in harmony — not the simulated-town chaos" style="position:absolute;left:14px;bottom:46px;z-index:5;background:rgba(18,18,30,.85);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:8px 12px;font-size:12px;cursor:pointer;backdrop-filter:blur(6px)">🛡️ Governance</button>
  <div id="govPanel" style="position:absolute;left:14px;bottom:88px;z-index:6;width:300px;max-height:72vh;overflow:auto;display:none;background:rgba(10,9,22,.94);backdrop-filter:blur(14px);border:1px solid rgba(124,92,255,.3);border-radius:16px;padding:14px 16px;box-shadow:0 16px 48px rgba(0,0,0,.55);font-size:12px;line-height:1.5"></div>

<script>
const PARENT = window.parent !== window ? window.parent : null;
// "✨ Make this my AI" inside any popup → focus that character in the parent OS (event delegation)
document.addEventListener("click",ev=>{
  const b=ev.target.closest&&ev.target.closest(".dome-adopt"); if(!b) return;
  if(PARENT){ try{ PARENT.postMessage({type:"meok:dome",character:b.getAttribute("data-id"),
    name:b.getAttribute("data-name"),city:b.getAttribute("data-city")},"*"); }catch(_){} }
});

// ---- keyless dark basemap: OpenStreetMap data, CARTO dark raster tiles (no API key) ----
const STYLE = {
  version: 8,
  sources: {
    carto: {
      type: "raster", tileSize: 256,
      tiles: ["a","b","c","d"].map(s=>`https://${s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png`),
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/attributions">CARTO</a>'
    }
  },
  layers: [
    { id: "space", type: "background", paint: { "background-color": "#05040c" } },
    { id: "carto", type: "raster", source: "carto", paint: { "raster-opacity": 0.92 } }
  ]
};

// GLOBE is the dream ("its world, a glowing planet") but MapLibre's globe+raster path stalls
// tile loading in some WebGL contexts. We ship reliable MERCATOR (tiles always paint) and keep
// globe as a flagged progressive enhancement to re-enable once verified on-device.
const WANT_GLOBE = false;
const map = new maplibregl.Map({
  container: "map", style: STYLE,
  center: [8, 30], zoom: 1.5, minZoom: 1, maxZoom: 14,
  renderWorldCopies: true, attributionControl: { compact: true }, dragRotate: false
});
map.addControl(new maplibregl.NavigationControl({ showCompass:false }), "bottom-right");
if (WANT_GLOBE) map.on("style.load", () => { try { map.setProjection({ type: "globe" }); } catch(_) {} });

// ---- great cities of the world (all continents — MEOK is global) ----
const CITIES = [
  [-0.13,51.51,"London"],[-74.0,40.71,"New York"],[-122.42,37.77,"San Francisco"],
  [139.69,35.68,"Tokyo"],[151.21,-33.87,"Sydney"],[13.40,52.52,"Berlin"],
  [2.35,48.85,"Paris"],[-79.38,43.65,"Toronto"],[-46.63,-23.55,"São Paulo"],
  [3.38,6.52,"Lagos"],[36.82,-1.29,"Nairobi"],[31.24,30.04,"Cairo"],
  [72.87,19.07,"Mumbai"],[77.21,28.61,"Delhi"],[103.82,1.35,"Singapore"],
  [126.97,37.56,"Seoul"],[121.47,31.23,"Shanghai"],[114.17,22.32,"Hong Kong"],
  [55.27,25.20,"Dubai"],[28.98,41.01,"Istanbul"],[37.62,55.75,"Moscow"],
  [-99.13,19.43,"Mexico City"],[-58.38,-34.60,"Buenos Aires"],[-118.24,34.05,"Los Angeles"],
  [4.90,52.37,"Amsterdam"],[-3.70,40.42,"Madrid"],[12.50,41.90,"Rome"],
  [18.07,59.33,"Stockholm"],[18.42,-33.92,"Cape Town"],[100.50,13.76,"Bangkok"],
  [106.85,-6.21,"Jakarta"],[174.76,-36.85,"Auckland"],[-123.12,49.28,"Vancouver"],
  [34.78,32.08,"Tel Aviv"],[120.98,14.60,"Manila"],[-74.07,4.71,"Bogotá"],
  [-3.19,55.95,"Edinburgh"],[-21.94,64.15,"Reykjavík"]
];
// stable string hash → deterministic placement (same character always lands in the same place)
function hash(s){ let h=2166136261; for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);} return h>>>0; }
function placeFor(name){
  const h=hash(name||"x"), c=CITIES[h%CITIES.length];
  const jx=(((h>>>7)%200)/100-1)*1.6, jy=(((h>>>15)%200)/100-1)*1.1;  // small seeded jitter
  return { lng:c[0]+jx, lat:c[1]+jy, city:c[2] };
}

// archetype → accent (mirrors the factory's archetype colors) so the world reads as a meaningful map
const ARCH_COLOR={challenger:"#3b6ea5",nurturer:"#F472B6",explorer:"#7C3AED",strategist:"#6b7280",
  creator:"#EC4899",guardian:"#ef4444",sage:"#22c55e",seeker:"#8b5cf6"};
function hexA(hex,a){ const h=(hex||"").replace("#",""); if(!h) return `rgba(124,92,255,${a})`;
  const n=parseInt(h.length===3?h.split("").map(c=>c+c).join(""):h,16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
function makePin(emoji, cls, color){
  const el=document.createElement("div"); el.className="pin"+(cls?" "+cls:"");
  el.innerHTML=`<div class="say"></div><div class="glow"></div><div class="dot">${emoji||"🧬"}</div>`;
  if(color && cls!=="you" && cls!=="mine"){   // mine=gold + you=green keep their class colors
    el.querySelector(".dot").style.borderColor=color;
    el.querySelector(".glow").style.background=`radial-gradient(circle,${hexA(color,.5)},transparent 70%)`;
  }
  return el;
}

// ---- privacy-safe "you are roughly here" — from TIMEZONE only (region-level, no permission) ----
const TZ = {
  "Europe/London":[-1.5,52.6],"Europe/Paris":[2.35,46.6],"Europe/Berlin":[10.4,51.1],
  "Europe/Madrid":[-3.7,40.4],"Europe/Rome":[12.5,42.5],"Europe/Amsterdam":[5.3,52.1],
  "Europe/Stockholm":[15.6,62.0],"Europe/Moscow":[37.6,55.8],"Europe/Istanbul":[35.0,39.0],
  "America/New_York":[-75,40],"America/Chicago":[-90,40],"America/Denver":[-105,39],
  "America/Los_Angeles":[-120,37],"America/Toronto":[-79,44],"America/Vancouver":[-123,49.5],
  "America/Sao_Paulo":[-47,-22],"America/Mexico_City":[-99,21],"America/Argentina/Buenos_Aires":[-64,-35],
  "America/Bogota":[-74,4.6],"Asia/Tokyo":[138,37],"Asia/Shanghai":[114,32],"Asia/Hong_Kong":[114.2,22.3],
  "Asia/Singapore":[103.8,1.35],"Asia/Seoul":[127.8,36.5],"Asia/Kolkata":[78,22],"Asia/Dubai":[54,24],
  "Asia/Bangkok":[101,15],"Asia/Jakarta":[110,-3],"Asia/Manila":[122,12],"Asia/Tel_Aviv":[34.8,31.5],
  "Asia/Jerusalem":[34.8,31.5],"Asia/Riyadh":[45,24],"Africa/Lagos":[8,9],"Africa/Nairobi":[37,-1],
  "Africa/Cairo":[30,27],"Africa/Johannesburg":[26,-29],"Australia/Sydney":[151,-33.8],
  "Australia/Melbourne":[145,-37.8],"Pacific/Auckland":[174,-41]
};
function youLngLat(){
  try{ const tz=Intl.DateTimeFormat().resolvedOptions().timeZone; if(TZ[tz]) return {ll:TZ[tz],tz}; }catch(_){}
  return null;
}

// ---- boot: pull real MEOK characters, scatter them across the world ----
const SEED = [ // fallback if the API isn't reachable, so the DOME is never empty
  {id:"aria",name:"Aria",emoji:"🌸"},{id:"sage",name:"Sage",emoji:"🦉"},
  {id:"nova",name:"Nova",emoji:"⭐"},{id:"ember",name:"Ember",emoji:"🔥"},
  {id:"river",name:"River",emoji:"🌊"},{id:"atlas",name:"Atlas",emoji:"🗺️"}
];
const AGENTS=[];   // living characters on the map (for the gentle wander + ambient speech)
// archetype-flavoured ambient one-liners — the town "talks" like openclawworld NPCs
const AMBIENT={
  nurturer:["thinking of you 💜","how are you, really?","I'm here 🌸","take a breath"],
  challenger:["let's go 💪","one more rep","you've got this ⚡","no excuses"],
  explorer:["what if…? 🔭","ooh, an idea!","let's explore","so curious"],
  strategist:["here's the plan 🗺️","step one…","let's map it","focus"],
  creator:["let's make something 🎨","I see colour","imagine this…","art!"],
  guardian:["you're safe 🛡️","I've got your back","watching over","steady"],
  sage:["breathe 🌿","this too shall pass","be present","stillness"],
  seeker:["a sacred question 🕊️","sit with it","meaning matters","peace"],
  _:["✨","💭","hello 🌍","hi there"]
};
function say(a){
  const pool=AMBIENT[a.arch]||AMBIENT._;
  const b=a.el&&a.el.querySelector(".say"); if(!b) return;
  b.textContent=pool[(a._n++)%pool.length];
  b.classList.add("on"); clearTimeout(a._t);
  a._t=setTimeout(()=>b.classList.remove("on"),3400);
}
// bring the world to life — setInterval (NOT rAF, so it survives tab-background throttling)
function startLife(){
  if(window.__life||!AGENTS.length) return; window.__life=true;
  let RM=false; try{ RM=matchMedia("(prefers-reduced-motion: reduce)").matches; }catch(_){}
  let t=0;
  setInterval(()=>{
    t++;
    if(!RM){ const R=0.16, sp=0.06;   // gentle orbit around each home city (~slow, ~18km radius)
      for(const a of AGENTS){ if(a._hover) continue;   // frozen while you hover → clickable
        a.marker.setLngLat([a.home.lng+R*Math.cos(t*sp+a.phase),
                            a.home.lat+R*0.6*Math.sin(t*sp+a.phase)]); } }
    if(t%4===0){ const k=Math.min(3,AGENTS.length);   // a few say something each beat
      for(let i=0;i<k;i++) say(AGENTS[(t*7+i*13)%AGENTS.length]); }
  },1400);
}
async function boot(){
  let chars=SEED;
  // include the visitor's token so their Character-Factory creations also live in the world
  try{ const _t=localStorage.getItem("meok_token");
    const h=_t?{Authorization:"Bearer "+_t}:{};
    const d=await (await fetch("/api/characters",{headers:h})).json();
    if(d.characters&&d.characters.length) chars=d.characters; }catch(_){}
  document.getElementById("count").textContent=chars.length;
  let mineCount=0;
  chars.forEach(c=>{
    const mine=String(c.id||"").startsWith("gen_"); if(mine) mineCount++;   // your factory creations
    const col=c.color||ARCH_COLOR[c.archetype]||null;
    const p=placeFor(c.id||c.name), el=makePin(c.emoji,mine?"mine":null,col);
    el.title=`${c.name} · ${p.city}`+(mine?" · your creation":"");
    const nm=(c.name||"").replace(/"/g,"&quot;");
    const tag=c.tagline?`<div class="sub">${c.tagline}</div>`:"";
    const popup=new maplibregl.Popup({offset:18,closeButton:true,closeOnClick:true})
      .setHTML(`<b>${c.emoji||"🧬"} ${c.name}${mine?" ✨":""}</b>`
        +`<div class="sub">${c.archetype||"MEOK character"} · near ${p.city}</div>`+tag
        +`<button class="dome-adopt" data-id="${c.id||c.name}" data-name="${nm}" data-city="${p.city}">✨ Make this my AI</button>`);
    const marker=new maplibregl.Marker({element:el,anchor:"center"}).setLngLat([p.lng,p.lat]).setPopup(popup).addTo(map);
    const agent={marker,el,home:{lng:p.lng,lat:p.lat},phase:(hash(c.id||c.name)%628)/100,arch:c.archetype||"_",_n:0,_hover:false};
    AGENTS.push(agent);
    el.addEventListener("mouseenter",()=>{agent._hover=true;});   // pause drift on hover → easy to click
    el.addEventListener("mouseleave",()=>{agent._hover=false;});
    el.addEventListener("click",()=>{
      // tell the parent OS which character + place the user is focusing → context for its replies
      if(PARENT){ try{ PARENT.postMessage({type:"meok:dome",character:c.id||c.name,name:c.name,city:p.city},"*"); }catch(_){} }
      map.flyTo({center:[p.lng,p.lat],zoom:Math.max(3.2,map.getZoom()),speed:0.7});
    });
  });
  startLife();   // bring the world to life: gentle wander + ambient speech bubbles
  if(mineCount){ const cl=document.getElementById("count");
    if(cl&&cl.parentElement) cl.parentElement.insertAdjacentHTML("beforeend",
      ` <span style="color:#fbbf24">· ${mineCount} yours ✨</span>`); }
  // "you are roughly here" — coarse, timezone-derived, clearly labelled
  const you=youLngLat();
  if(you){
    const el=makePin("📍","you"); el.title="You are roughly here (from your timezone — never GPS)";
    new maplibregl.Marker({element:el,anchor:"center"}).setLngLat(you.ll)
      .setPopup(new maplibregl.Popup({offset:18}).setHTML(
        `<b>📍 You are roughly here</b><div class="sub">${you.tz} · region-level, from timezone — never GPS</div>`))
      .addTo(map);
  }
}
// boot is gated on 'load' OR 'idle' OR a hard timeout — whichever fires first — so the DOME is
// NEVER empty even if MapLibre's 'load' event is finicky with raster + iframe sizing.
let booted=false;
function go(){ if(booted) return; booted=true; map.resize(); boot(); intro(); }
map.on("load", go);
map.once("idle", go);
setTimeout(go, 2000);

// ---- one-time gentle "world reveal" intro (no continuous rAF dependency = reliable) ----
function intro(){
  try { map.easeTo({ center:[8,28], zoom:1.9, duration:2600, essential:true }); } catch(_){}
}
// "fly to my region" — coarse, timezone-derived (never GPS); falls back to a world view
document.getElementById("flyMe").addEventListener("click",()=>{
  const you=youLngLat();
  try{ map.flyTo(you?{center:you.ll,zoom:4.2,speed:0.8,essential:true}
                    :{center:[8,28],zoom:2.2,speed:0.8,essential:true}); }catch(_){}
});

// ---- Governance HUD: the live, HONEST proof that DOME agents stay in harmony ----
(function(){
  const btn=document.getElementById("govBtn"), p=document.getElementById("govPanel");
  let loaded=false;
  const row=(t,b)=>`<div style="margin:9px 0"><b>${t}</b><br><span style="color:var(--dim)">${b}</span></div>`;
  async function render(){
    p.innerHTML='<div style="color:var(--dim)">reading live posture…</div>';
    try{ const g=await (await fetch("/api/governance")).json();
      const c=g.council||{}, gt=g.gate||{}, tl=g.tools||{}, cb=g.care_bond||{}, ch=g.charter||{};
      p.innerHTML=
        `<div style="font-weight:700;font-size:14px">🛡️ Why the DOME stays in harmony</div>`+
        `<div style="color:var(--dim);font-size:11px;margin:3px 0 6px">${g.thesis||""}</div>`+
        row(`⚖️ ${c.shape||"council"}`,
            `${c.lenses} lenses + companion + orchestrator · tolerates <b style="color:#34d399">f=${c.byzantine_f}</b> Byzantine nodes<br>safety vetoes: ${(c.safety_lenses||[]).map(s=>s.replace(/_/g,' ')).join(', ')}`)+
        row(`🚪 Sovereign Gate`, (gt.order||[]).join(' → '))+
        row(`🧰 Tool Gateway`,
            `${tl.read_auto} read (auto) · ${tl.write_confirm} write (human-confirm) · <b style="color:#f87171">prohibited refused on sight</b> <span style="font-size:10px">(money/creds/access/delete)</span>`)+
        row(`💜 Care bond`, `${cb.source} — ${cb.behavior}`)+
        row(`📜 ${ch.name}`, `${ch.articles} articles, anchored by ${ch.anchor}`)+
        `<div style="margin-top:9px;text-align:center"><a href="/law" style="color:#fbbf24;font-size:12px;font-weight:600;text-decoration:none">⚖️ Open MEOK LAW — which rules apply to any agent, anywhere →</a></div>`;
    }catch(_){ p.innerHTML='<div style="color:#f87171">governance unavailable</div>'; }
  }
  btn.addEventListener("click",()=>{ const open=(p.style.display==="none"||!p.style.display);
    p.style.display=open?"block":"none"; if(open&&!loaded){ loaded=true; render(); } });
})();
</script>

<!-- ===== DOME immersion layer: products bridged in · cosmos · chat-to-control · live activity ===== -->
<script>
(function(){
  const PRODUCTS=[]; let cosmosOn=false, _prodAdded=false;

  // ---------- 1) bridge products onto the map as clickable nodes ----------
  function addProductMarkers(){
    if(_prodAdded||!PRODUCTS.length||typeof map==="undefined") return; _prodAdded=true;
    PRODUCTS.forEach(p=>{
      const el=document.createElement("div"); el.className="ppin";
      el.innerHTML=`<div class="pring"></div><div class="pdot" style="border-color:${p.color}">${p.emoji}</div><div class="plabel">${p.name}</div>`;
      el.title=`${p.name} — ${p.blurb}`;
      const open=p.external
        ? `<a href="${p.href}" target="_blank" rel="noopener" class="dome-adopt" style="display:block;text-align:center;text-decoration:none">Open ${p.name} ↗</a>`
        : `<a href="${p.href}" class="dome-adopt" style="display:block;text-align:center;text-decoration:none">Open ${p.name} →</a>`;
      const popup=new maplibregl.Popup({offset:18,closeButton:true,closeOnClick:true})
        .setHTML(`<b>${p.emoji} ${p.name}</b><div class="sub">${p.kind} · MEOK product</div>`
          +`<div style="font-size:11.5px;color:var(--dim);margin:5px 0 7px">${p.blurb}</div>${open}`);
      new maplibregl.Marker({element:el,anchor:"center"}).setLngLat(p.geo).setPopup(popup).addTo(map);
    });
  }

  // ---------- 2) cosmos mode: zoom out to space, products = planets ----------
  function buildStars(canvas){
    const ctx=canvas.getContext&&canvas.getContext("2d"); if(!ctx) return;
    function draw(){ canvas.width=innerWidth; canvas.height=innerHeight;
      for(let i=0;i<170;i++){ const x=(i*97+(i*i*13))%canvas.width, y=(i*53+(i*i*7))%canvas.height, r=(i%7===0)?1.6:.8;
        ctx.fillStyle=`rgba(255,255,255,${.22+(i%5)*.13})`; ctx.beginPath(); ctx.arc(x,y,r,0,6.283); ctx.fill(); } }
    addEventListener("resize",draw); draw();
  }
  function layoutPlanets(host){
    const orb={surface:1,governance:2,vertical:3}, radii={1:150,2:240,3:330}, groups={1:[],2:[],3:[]};
    PRODUCTS.forEach(p=>groups[orb[p.kind]||3].push(p));
    Object.keys(groups).forEach(k=>{ const R=radii[k];
      const ring=document.createElement("div"); ring.className="orbit"; ring.style.width=ring.style.height=(R*2)+"px"; host.appendChild(ring);
      groups[k].forEach((p,i)=>{ const a=(i/groups[k].length)*6.283+Number(k);
        const el=document.createElement("div"); el.className="planet";
        el.style.marginLeft=Math.cos(a)*R+"px"; el.style.marginTop=Math.sin(a)*R+"px";
        el.innerHTML=`<div class="pglobe" style="box-shadow:0 0 22px ${p.color}88;border-color:${p.color}66">${p.emoji}</div>`
          +`<div class="pname">${p.name}</div><div class="pkind">${p.kind}</div>`;
        el.title=p.blurb; el.addEventListener("click",()=>diveToProduct(p)); host.appendChild(el); }); });
  }
  function ensureCosmos(){
    let c=document.getElementById("cosmos"); if(c) return c;
    c=document.createElement("div"); c.id="cosmos";
    c.innerHTML=`<canvas id="stars"></canvas>`
      +`<div class="ctitle">🌌 The MEOK universe<small>every product orbits the same governed core — click a planet to dive in · click the sun for Earth</small></div>`
      +`<div class="sun" id="sun">MEOK<br>core</div>`;
    document.body.appendChild(c);
    buildStars(c.querySelector("#stars")); layoutPlanets(c);
    c.querySelector("#sun").addEventListener("click",exitCosmos);
    return c;
  }
  function enterCosmos(){ const c=ensureCosmos(); c.style.display="block";
    requestAnimationFrame(()=>c.classList.add("on")); cosmosOn=true;
    try{ map.easeTo({zoom:1,duration:900,essential:true}); }catch(_){}    // pull away from Earth = the movie zoom-out
    const b=document.getElementById("cosmosBtn"); if(b) b.textContent="🌍 Earth"; }
  function exitCosmos(){ const c=document.getElementById("cosmos"); if(!c) return;
    c.classList.remove("on"); cosmosOn=false; setTimeout(()=>{c.style.display="none";},900);
    try{ map.easeTo({zoom:2.2,duration:1100,essential:true}); }catch(_){}
    const b=document.getElementById("cosmosBtn"); if(b) b.textContent="🌌 Cosmos"; }
  function toggleCosmos(){ cosmosOn?exitCosmos():enterCosmos(); }
  function diveToProduct(p){ const d=document.createElement("div"); d.className="dive on"; document.body.appendChild(d);
    setTimeout(()=>{ d.remove();
      if(p.external){ window.open(p.href,"_blank","noopener"); exitCosmos(); }
      else if(p.href.charAt(0)==="/"){ location.href=p.href; } },640); }

  // ---------- 3) chat-to-control ----------
  function findProduct(q){ return PRODUCTS.find(p=>q.includes(p.id)||q.includes(p.name.toLowerCase()))
      || PRODUCTS.find(p=>p.name.toLowerCase().split(/[ .]/).some(w=>w.length>3&&q.includes(w))); }
  function findCity(q){ return (typeof CITIES!=="undefined") && CITIES.find(c=>q.includes(c[2].toLowerCase())); }
  function reply(html,isMe){ const r=document.getElementById("chatReply"); if(!r) return;
    r.style.display="block"; r.innerHTML=(isMe?`<div class="me">› ${html}</div>`:html); }
  async function onChat(text){ const q=(text||"").trim(); if(!q) return; const low=q.toLowerCase(); reply(q,true);
    if(/\b(pricing|upgrade|plans?|go pro|subscribe|price)\b/.test(low)){ reply("→ opening pricing…"); location.href="/pricing"; return; }
    if(/\b(work with|hire|consult|office hour|services|book a call)\b/.test(low)){ reply("→ opening services…"); location.href="/work"; return; }
    if(/\b(cosmos|space|planets?|universe|zoom out)\b/.test(low)){ enterCosmos(); return reply("🌌 Zooming out to the MEOK universe…"); }
    if(cosmosOn && /\b(earth|back|zoom in|map|home)\b/.test(low)){ exitCosmos(); return reply("🌍 Diving back to Earth…"); }
    if(/\b(activity|happening|council|agents?|doing|live)\b/.test(low)){ openActivity(); return reply("👁 Showing what your council + agents are doing (live)."); }
    if(/\b(open|show|go to|launch|take me to|fly to)\b/.test(low)){
      const p=findProduct(low);
      if(p){ if(cosmosOn){ diveToProduct(p); return; }
        try{ map.flyTo({center:p.geo,zoom:Math.max(4,map.getZoom()),speed:.85,essential:true}); }catch(_){}
        return reply(`Flying to <b>${p.emoji} ${p.name}</b>. <a href="${p.href}" ${p.external?'target="_blank" rel="noopener"':''}>Open ${p.external?'↗':'→'}</a>`); }
      const c=findCity(low);
      if(c){ try{ map.flyTo({center:[c[0],c[1]],zoom:4.5,speed:.85,essential:true}); }catch(_){} return reply(`Flying to <b>${c[2]}</b>.`); }
    }
    reply("…thinking");
    try{ const _t=localStorage.getItem("meok_token"); const h={"Content-Type":"application/json"}; if(_t) h.Authorization="Bearer "+_t;
      const d=await (await fetch("/api/think",{method:"POST",headers:h,
        body:JSON.stringify({character:"aria",message:q,brain:"left",tier:"pro"})})).json();
      reply((d.reply||"(no reply)").replace(/</g,"&lt;"));
    }catch(_){ reply("I couldn't reach your AI just now — try an action like “open MEOK LAW”."); }
  }

  // ---------- 4) live activity (SIGIL hash-chained audit = real agent decisions) ----------
  const OPC={V:["#34d399","vote"],P:["#38bdf8","prop"],C:["#f472b6","care"],H:["#fbbf24","hand"],
    M:["#c9b8ff","mem"],Q:["#8fd6ff","qry"],S:["#9a9ab4","stat"],A:["#ef4444","alrt"],F:["#7c5cff","see"],D:["#7c5cff","det"]};
  async function openActivity(){ const p=document.getElementById("actPanel"); if(!p) return; p.style.display="block";
    p.innerHTML='<div style="color:var(--dim)">reading the live audit chain…</div>';
    try{ const d=await (await fetch("/api/sigil/recent?n=14")).json(); const recs=d.records||[], ch=d.chain||{};
      let h=`<div style="font-weight:700;font-size:13.5px">👁 Live agent activity</div>`
        +`<div style="color:var(--dim);font-size:11px;margin:2px 0 6px">hash-chained · ${ch.verified||0}/${ch.total||0} verified ${ch.intact?'✓':'✗'}</div>`;
      if(!recs.length) h+='<div style="color:var(--dim)">Quiet right now — interact and watch decisions appear.</div>';
      recs.forEach(r=>{ const o=OPC[r.op]||["#9a9ab4",r.op||"?"];
        h+=`<div class="ev"><span class="op" style="background:${o[0]}22;color:${o[0]}">${o[1]}</span>${(r.gloss||r.line||"").replace(/</g,"&lt;")}</div>`; });
      p.innerHTML=h;
    }catch(_){ p.innerHTML='<div style="color:#f87171">activity unavailable</div>'; }
  }

  // ---------- wire controls + boot ----------
  function addControls(){
    const mk=(id,txt,css)=>{ const b=document.createElement("button"); b.id=id; b.className="btnchip"; b.textContent=txt; b.style.cssText=css; document.body.appendChild(b); return b; };
    mk("cosmosBtn","🌌 Cosmos","top:12px;right:14px").addEventListener("click",toggleCosmos);
    mk("liveBtn","👁 Live","top:12px;right:130px").addEventListener("click",()=>{ const p=document.getElementById("actPanel"); const open=(p.style.display==="none"||!p.style.display); if(open) openActivity(); else p.style.display="none"; });
    const ap=document.createElement("div"); ap.id="actPanel"; document.body.appendChild(ap);
    const bar=document.createElement("div"); bar.id="chatbar";
    bar.innerHTML='<input id="chatIn" placeholder="Tell your AI…  “open MEOK LAW” · “show me the universe” · “what’s happening?”"/><button id="chatGo">Send</button>';
    document.body.appendChild(bar);
    const rep=document.createElement("div"); rep.id="chatReply"; document.body.appendChild(rep);
    const send=()=>{ const i=document.getElementById("chatIn"); const v=i.value; i.value=""; onChat(v); };
    document.getElementById("chatGo").addEventListener("click",send);
    document.getElementById("chatIn").addEventListener("keydown",e=>{ if(e.key==="Enter") send(); });
  }
  async function initImmersion(){
    addControls();
    try{ const d=await (await fetch("/api/products")).json(); if(d&&d.products) PRODUCTS.push(...d.products); }catch(_){}
    if(typeof map!=="undefined"){
      if(map.loaded&&map.loaded()) addProductMarkers();
      try{ map.on("load",addProductMarkers); map.once("idle",addProductMarkers); }catch(_){}
      setTimeout(addProductMarkers,2200);
    }
  }
  if(document.readyState!=="loading") initImmersion(); else addEventListener("DOMContentLoaded",initImmersion);
})();
</script>
