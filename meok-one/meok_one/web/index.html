<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MEOK ONE — hatch your care-director</title>
<style>
  :root{ --bg:#0a0a0f; --panel:#15151f; --line:#262633; --txt:#e8e8f0; --dim:#8a8a9a; --accent:#7C3AED; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg);
        color:var(--txt); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
  .wrap{ width:100%; max-width:760px; padding:1.2rem; flex:1; display:flex; flex-direction:column; }
  header{ text-align:center; padding:1.2rem 0 .6rem; }
  header h1{ font-size:1.5rem; letter-spacing:-.02em; font-weight:800; }
  header .sub{ color:var(--dim); font-size:.85rem; margin-top:.2rem; }
  .hidden{ display:none !important; }

  /* HATCH screen */
  .egg{ font-size:4rem; text-align:center; margin:1rem 0 .4rem; animation:bob 3s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-10px) } }
  .step-label{ color:var(--dim); font-size:.8rem; text-transform:uppercase; letter-spacing:.08em; margin:1.2rem 0 .5rem; }
  .grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:.6rem; }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:.8rem; padding:.85rem;
         cursor:pointer; transition:.15s; }
  .card:hover{ border-color:var(--accent); transform:translateY(-2px); }
  .card.sel{ border-color:#fff; box-shadow:0 0 0 2px rgba(255,255,255,.15); }
  .card .em{ font-size:1.5rem; }
  .card .lbl{ font-weight:700; margin:.25rem 0; }
  .card .desc{ color:var(--dim); font-size:.78rem; line-height:1.35; }
  .styles{ display:flex; flex-wrap:wrap; gap:.5rem; }
  .chip{ background:var(--panel); border:1px solid var(--line); border-radius:2rem; padding:.45rem .9rem;
         cursor:pointer; font-size:.85rem; transition:.15s; }
  .chip:hover{ border-color:var(--accent); }
  .chip.sel{ background:var(--accent); border-color:var(--accent); color:#fff; }
  input[type=text]{ width:100%; background:var(--panel); border:1px solid var(--line); border-radius:.7rem;
         padding:.8rem 1rem; color:var(--txt); font-size:1rem; margin-top:.5rem; }
  input[type=text]:focus{ outline:none; border-color:var(--accent); }
  .btn{ background:var(--accent); color:#fff; border:none; border-radius:.7rem; padding:.85rem 1.5rem;
        font-size:1rem; font-weight:700; cursor:pointer; width:100%; margin-top:1.2rem; transition:.15s; }
  .btn:hover{ filter:brightness(1.1); } .btn:disabled{ opacity:.5; cursor:not-allowed; }

  /* CHAT screen */
  .chead{ display:flex; align-items:center; gap:.8rem; padding:.9rem 1rem; border-radius:.9rem; margin-bottom:.8rem; }
  .chead .av{ font-size:2rem; } .chead h2{ font-size:1.15rem; } .chead .tag{ font-size:.78rem; opacity:.85; }
  .toggle{ display:flex; gap:.4rem; margin-bottom:.7rem; }
  .toggle button{ flex:1; background:var(--panel); border:1px solid var(--line); color:var(--dim);
        border-radius:.6rem; padding:.5rem; font-size:.8rem; cursor:pointer; transition:.15s; }
  .toggle button.on{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .toggle button .h{ display:block; font-weight:700; color:inherit; }
  .msgs{ flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:.6rem; padding:.4rem 0; min-height:240px; }
  .msg{ max-width:82%; padding:.7rem .95rem; border-radius:1rem; font-size:.95rem; line-height:1.45; white-space:pre-wrap; }
  .msg.you{ align-self:flex-end; background:var(--accent); color:#fff; border-bottom-right-radius:.3rem; }
  .msg.them{ align-self:flex-start; background:var(--panel); border:1px solid var(--line); border-bottom-left-radius:.3rem; }
  .msg .meta{ font-size:.68rem; color:var(--dim); margin-top:.3rem; }
  .typing{ align-self:flex-start; color:var(--dim); font-size:.85rem; padding:.4rem .9rem; }
  .composer{ display:flex; gap:.5rem; padding-top:.6rem; }
  .composer input{ margin:0; flex:1; }
  .composer button{ width:auto; margin:0; padding:.8rem 1.2rem; }
  .back{ background:none; border:none; color:var(--dim); cursor:pointer; font-size:.8rem; margin-bottom:.5rem; }
  footer{ color:var(--dim); font-size:.72rem; text-align:center; padding:1rem 0; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>MEOK ONE</h1>
    <div class="sub">hatch your care-director — one character, the whole OS behind it</div>
  </header>

  <!-- HATCH -->
  <section id="hatch">
    <div class="egg" id="egg">🥚</div>
    <div class="step-label">1 · choose a nature</div>
    <div class="grid" id="archGrid"></div>
    <div class="step-label">2 · choose a care style</div>
    <div class="styles" id="styleChips"></div>
    <div class="step-label">3 · name them</div>
    <input type="text" id="nameInput" placeholder="give your care-director a name…" autocomplete="off">
    <button class="btn" id="hatchBtn" disabled>🥚 Hatch</button>
  </section>

  <!-- CHAT -->
  <section id="chat" class="hidden">
    <button class="back" id="backBtn">← hatch another</button>
    <div class="chead" id="chead"><div class="av" id="cav">🌸</div>
      <div><h2 id="cname">…</h2><div class="tag" id="ctag"></div></div></div>
    <div class="toggle" id="brainToggle">
      <button data-brain="left" class="on"><span class="h">🧠 Left Brain</span>local · private · free</button>
      <button data-brain="right"><span class="h">☁️ Right Brain</span>API · powerful</button>
      <button data-brain="both"><span class="h">⚖️ Council</span>both · safest</button>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="composer">
      <input type="text" id="msgInput" placeholder="say something…" autocomplete="off">
      <button class="btn" id="sendBtn">Send</button>
    </div>
  </section>

  <footer>Sovereign keeps every brain safe · © CSOAI LTD (MEOK AI Labs)</footer>
</div>

<script>
const $ = s => document.querySelector(s);
let sel = { archetype:null, care_style:null }, current=null, brain="left";

async function api(path, opts){ const r = await fetch(path, opts); return r.json(); }

// ---- build hatch screen ----
(async function init(){
  const data = await api("/api/archetypes");
  const grid = $("#archGrid");
  data.archetypes.forEach(a=>{
    const d = document.createElement("div"); d.className="card";
    d.innerHTML = `<div class="em">${a.emoji}</div><div class="lbl">${a.label}</div><div class="desc">${a.description}</div>`;
    d.onclick = ()=>{ sel.archetype=a.id; document.querySelectorAll("#archGrid .card").forEach(c=>c.classList.remove("sel")); d.classList.add("sel"); checkReady(); };
    grid.appendChild(d);
  });
  const chips = $("#styleChips");
  Object.keys(data.care_styles).forEach(s=>{
    const c = document.createElement("div"); c.className="chip"; c.textContent=s;
    c.onclick = ()=>{ sel.care_style=s; document.querySelectorAll("#styleChips .chip").forEach(x=>x.classList.remove("sel")); c.classList.add("sel"); checkReady(); };
    chips.appendChild(c);
  });
})();
$("#nameInput").oninput = checkReady;
function checkReady(){ $("#hatchBtn").disabled = !(sel.archetype && sel.care_style); }

// ---- hatch ----
$("#hatchBtn").onclick = async ()=>{
  $("#egg").textContent="🐣"; $("#hatchBtn").disabled=true; $("#hatchBtn").textContent="✨ hatching…";
  const res = await api("/api/hatch", { method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ archetype:sel.archetype, care_style:sel.care_style, name:$("#nameInput").value.trim() }) });
  current = res;
  const g = res.visual.gradient || `linear-gradient(135deg, ${res.visual.color_primary}, ${res.visual.color_secondary||'#333'})`;
  $("#chead").style.background = g;
  $("#cav").textContent = res.visual.emoji;
  $("#cname").textContent = res.name;
  $("#ctag").textContent = `${res.archetype} · ${res.care_style} · ${res.stage_emoji} ${res.stage}`;
  $("#hatch").classList.add("hidden"); $("#chat").classList.remove("hidden");
  addMsg("them", `${res.stage_emoji} ${res.name} has hatched. "${res.tagline}"`, "just now");
};

// ---- brain toggle ----
$("#brainToggle").onclick = e=>{ const b=e.target.closest("button"); if(!b)return;
  brain=b.dataset.brain; document.querySelectorAll("#brainToggle button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); };

// ---- chat ----
function addMsg(who, text, meta){ const m=document.createElement("div"); m.className="msg "+who;
  m.innerHTML = text.replace(/</g,"&lt;") + (meta?`<div class="meta">${meta}</div>`:""); $("#msgs").appendChild(m);
  $("#msgs").scrollTop = $("#msgs").scrollHeight; return m; }

async function send(){
  const t = $("#msgInput").value.trim(); if(!t || !current) return;
  $("#msgInput").value=""; addMsg("you", t);
  const typing = document.createElement("div"); typing.className="typing"; typing.textContent=`${current.name} is thinking…`;
  $("#msgs").appendChild(typing); $("#msgs").scrollTop=$("#msgs").scrollHeight;
  let res;
  try{ res = await api("/api/think", { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ character:current.character_id, message:t, brain, tier:"pro" }) }); }
  catch(e){ res = { reply:"[connection error]", backend:"none" }; }
  typing.remove();
  const meta = `${res.brain||brain} brain · ${res.engine||res.backend||"?"}${res.safe===false?" · ⚠ held":""}`;
  addMsg("them", res.reply || "[no reply]", meta);
}
$("#sendBtn").onclick = send;
$("#msgInput").addEventListener("keydown", e=>{ if(e.key==="Enter") send(); });
$("#backBtn").onclick = ()=>{ $("#chat").classList.add("hidden"); $("#hatch").classList.remove("hidden");
  $("#egg").textContent="🥚"; $("#hatchBtn").textContent="🥚 Hatch"; $("#msgs").innerHTML=""; sel={archetype:null,care_style:null};
  document.querySelectorAll(".sel").forEach(x=>x.classList.remove("sel")); $("#nameInput").value=""; checkReady(); };
</script>
</body>
</html>
