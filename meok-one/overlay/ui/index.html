<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MEOK Overlay</title>
<style>
  html,body{margin:0;height:100%;background:transparent;overflow:hidden;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  #bar{height:24px;background:rgba(12,12,22,.78);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
       display:flex;align-items:center;gap:8px;padding:0 8px;color:#c9b8ff;font-size:11px;
       user-select:none;-webkit-user-select:none;cursor:grab;border-bottom:1px solid rgba(255,255,255,.08)}
  #bar b{color:#fbbf24}
  #bar .sp{margin-left:auto;display:flex;gap:7px}
  .ic{cursor:pointer;opacity:.8;padding:0 2px}.ic:hover{opacity:1}
  iframe{border:0;width:100%;height:calc(100% - 24px);background:transparent;display:block}
  #err{position:absolute;inset:24px 0 0 0;display:none;place-items:center;color:#9a9ab4;
       font-size:12.5px;text-align:center;padding:22px;line-height:1.5}
  code{color:#8fd6ff;font-size:11px}
</style>
</head>
<body>
  <div id="bar" data-tauri-drag-region>⚔️ <b>MEOK</b> <span style="opacity:.6">overlay</span>
    <span class="sp">
      <span class="ic" id="ghost" title="ghost / dim">👻</span>
      <span class="ic" id="pin" title="always-on-top: on">📌</span>
      <span class="ic" id="reload" title="reload">⟳</span>
      <span class="ic" id="close" title="close">✕</span>
    </span>
  </div>
  <iframe id="hud" allow="display-capture; microphone; clipboard-write"></iframe>
  <div id="err">Can't reach the MEOK HUD.<br>Set it from the overlay devtools console:<br>
    <code>localStorage.setItem("meok_hud_url","https://YOUR-HOST/hud")</code><br>then click ⟳.</div>
<script>
  // Which HUD to float. Defaults to the public host; override per-machine via localStorage.
  const HUD = localStorage.getItem("meok_hud_url") || "https://one.meok.ai/hud";
  const f = document.getElementById("hud"); f.src = HUD;
  f.addEventListener("error", () => { document.getElementById("err").style.display = "grid"; });

  // Drive the native window via the global Tauri API (app.withGlobalTauri = true).
  const T = window.__TAURI__;
  const W = (T && T.window && T.window.getCurrentWindow) ? T.window.getCurrentWindow() : null;
  let ghost = false, pinned = true;
  document.getElementById("ghost").onclick = () => {
    ghost = !ghost; document.body.style.opacity = ghost ? "0.55" : "1";
  };
  document.getElementById("pin").onclick = async (e) => {
    pinned = !pinned; if (W) { try { await W.setAlwaysOnTop(pinned); } catch (_) {} }
    e.target.title = "always-on-top: " + (pinned ? "on" : "off");
    e.target.style.opacity = pinned ? "1" : ".4";
  };
  document.getElementById("reload").onclick = () => {
    f.src = localStorage.getItem("meok_hud_url") || HUD;
    document.getElementById("err").style.display = "none";
  };
  document.getElementById("close").onclick = async () => { if (W) { try { await W.close(); } catch (_) {} } };
</script>
</body>
</html>
