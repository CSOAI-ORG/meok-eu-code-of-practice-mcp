<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God's Eye - Scan Results</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.6;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 2rem;
            border-bottom: 1px solid #333;
        }
        
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            padding: 2rem;
        }
        
        .stat-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #333;
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: #555;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .stat-label {
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .content {
            padding: 2rem;
        }
        
        .section {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #333;
        }
        
        .section h2 {
            color: #fff;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .subdomain {
            background: #252525;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-left: 4px solid #00d4ff;
        }
        
        .subdomain-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        
        .subdomain-url {
            font-weight: bold;
            color: #00d4ff;
            font-size: 1.1rem;
        }
        
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .status-200 { background: #22c55e; color: #000; }
        .status-300 { background: #f59e0b; color: #000; }
        .status-400 { background: #ef4444; color: #fff; }
        .status-500 { background: #dc2626; color: #fff; }
        
        .detail-row {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: #aaa;
        }
        
        .detail-label {
            color: #666;
            min-width: 80px;
        }
        
        .vulnerability {
            background: #3f1f1f;
            border: 1px solid #dc2626;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
        }
        
        .vulnerability-title {
            color: #ef4444;
            font-weight: bold;
            margin-bottom: 0.25rem;
        }
        
        .severity {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .severity-critical { background: #dc2626; color: #fff; }
        .severity-high { background: #ef4444; color: #fff; }
        .severity-medium { background: #f59e0b; color: #000; }
        .severity-low { background: #22c55e; color: #000; }
        
        .tech-tag {
            display: inline-block;
            background: #333;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 0.5rem;
            margin-bottom: 0.25rem;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #file-input {
            display: none;
        }
        
        .upload-btn {
            background: linear-gradient(135deg, #7b2cbf, #00d4ff);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin: 2rem;
            transition: opacity 0.2s;
        }
        
        .upload-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>👁️ God's Eye - Scan Results</h1>
        <p style="color: #888;">AI-powered attack surface discovery</p>
    </div>

    <div style="text-align: center; padding: 2rem;">
        <input type="file" id="file-input" accept=".json" onchange="loadFile(event)">
        <button class="upload-btn" onclick="document.getElementById('file-input').click()">
            📁 Load JSON Report
        </button>
        <p style="color: #666; margin-top: 1rem;">
            Export with: <code style="background: #1a1a1a; padding: 0.25rem 0.5rem; border-radius: 4px;">god-eye -d target.com -o report.json -f json</code>
        </p>
    </div>

    <div id="results" style="display: none;">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Subdomains</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-active">0</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-vulns">0</div>
                <div class="stat-label">Vulnerabilities</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-time">0s</div>
                <div class="stat-label">Scan Time</div>
            </div>
        </div>

        <div class="content">
            <div class="section" id="vulnerabilities-section" style="display: none;">
                <h2>🚨 Vulnerabilities</h2>
                <div id="vulnerabilities-list"></div>
            </div>

            <div class="section">
                <h2>🌐 Subdomains</h2>
                <div id="subdomains-list"></div>
            </div>
        </div>
    </div>

    <script>
        function loadFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    displayResults(data);
                } catch (err) {
                    alert('Error parsing JSON: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function displayResults(data) {
            document.getElementById('results').style.display = 'block';
            
            // Stats
            document.getElementById('stat-total').textContent = data.stats?.total_subdomains || 0;
            document.getElementById('stat-active').textContent = data.stats?.active_subdomains || 0;
            document.getElementById('stat-vulns').textContent = data.stats?.vulnerabilities || 0;
            document.getElementById('stat-time').textContent = data.meta?.duration || '0s';

            // Vulnerabilities
            const vulnsContainer = document.getElementById('vulnerabilities-list');
            const vulnsSection = document.getElementById('vulnerabilities-section');
            vulnsContainer.innerHTML = '';

            if (data.findings) {
                const allFindings = [
                    ...(data.findings.critical || []),
                    ...(data.findings.high || []),
                    ...(data.findings.medium || []),
                    ...(data.findings.low || [])
                ];

                if (allFindings.length > 0) {
                    vulnsSection.style.display = 'block';
                    allFindings.forEach(finding => {
                        const severity = finding.severity || 'medium';
                        vulnsContainer.innerHTML += `
                            <div class="vulnerability">
                                <div class="vulnerability-title">
                                    <span class="severity severity-${severity}">${severity}</span>
                                    ${finding.type || finding.title || 'Finding'}
                                </div>
                                <div style="color: #aaa; font-size: 0.9rem;">
                                    ${finding.subdomain || ''} - ${finding.description || finding.message || ''}
                                </div>
                            </div>
                        `;
                    });
                }
            }

            // Subdomains
            const subdomainsContainer = document.getElementById('subdomains-list');
            subdomainsContainer.innerHTML = '';

            if (data.subdomains) {
                data.subdomains.forEach(sub => {
                    const statusClass = sub.status_code >= 500 ? 'status-500' :
                                       sub.status_code >= 400 ? 'status-400' :
                                       sub.status_code >= 300 ? 'status-300' : 'status-200';
                    
                    let techHtml = '';
                    if (sub.technologies && sub.technologies.length > 0) {
                        techHtml = '<div style="margin-top: 0.5rem;">' +
                            sub.technologies.map(t => `<span class="tech-tag">${t}</span>`).join('') +
                            '</div>';
                    }

                    subdomainsContainer.innerHTML += `
                        <div class="subdomain">
                            <div class="subdomain-header">
                                <span class="subdomain-url">${sub.subdomain}</span>
                                <span class="status-badge ${statusClass}">${sub.status_code || '?'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">IP:</span>
                                <span>${sub.ips ? sub.ips.join(', ') : 'N/A'}</span>
                            </div>
                            ${sub.title ? `
                            <div class="detail-row">
                                <span class="detail-label">Title:</span>
                                <span>${sub.title}</span>
                            </div>` : ''}
                            ${sub.cloud_provider ? `
                            <div class="detail-row">
                                <span class="detail-label">Cloud:</span>
                                <span>${sub.cloud_provider}</span>
                            </div>` : ''}
                            ${techHtml}
                        </div>
                    `;
                });
            }
        }
    </script>
</body>
</html>
